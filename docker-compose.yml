services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/public
    networks:
      - chores-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: family_chores
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    networks:
      - chores-network

networks:
  chores-network:
    driver: bridge
